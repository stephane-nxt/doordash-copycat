name: CI workflow
on:
  push:
    branches:
      - main
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Build Docker image
        run: docker build -t doordash-copycat:latest .

      - name: Run Docker container
        run: docker run --name doordash-copycat-container  -p 8080:8090 doordash-copycat:latest

      - name: Run Docker container
        run: docker ps -a
      
      - name: Stop Docker container
        run: docker stop doordash-copycat-container
